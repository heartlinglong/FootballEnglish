        --stadium-green: #2d5a27;

    }
    .stadium-perspective {
        perspective: 1000px;
    }
    .football-field {
        transform: rotateX(60deg);
        transform-origin: bottom;
        background: repeating-linear-gradient(
            0deg,
            var(--stadium-green),
            var(--stadium-green) 100px,
            var(--stadium-grass-light) 100px,
            var(--stadium-grass-light) 200px

    }
    .orb-glow {

    }
    .glass-hud {
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .energy-bar-vertical {
        background: linear-gradient(to top, #162210, #6af425);
    }
</style>
